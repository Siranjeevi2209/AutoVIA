name: Update Auto-VIA CVE Database

on:
  schedule:
    - cron: '0 5 * * *'   # Daily at 12:00 AM EST (5:00 AM UTC)
  workflow_dispatch:

jobs:
  update-cves:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch automotive CVEs from NVD
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: |
          node scripts/fetch-cves.cjs

      - name: Commit and push updated database
        run: |
          git config --local user.email "autovia-bot@github.com"
          git config --local user.name "Auto-VIA Bot"
          git add public/cve-database.json
          if git diff --quiet --cached; then
            echo "No changes to commit"
          else
            git commit -m "chore: update CVE database $(date -u +'%Y-%m-%d')"
            git pull --rebase
            git push
          fi
          
